<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mummy ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background: linear-gradient(to bottom, #000000, #1a1a2e);
color:white;
overflow-x:hidden;
text-align:center;
}

/* Floating hearts & flowers */
.heart, .flower {
position: fixed;
bottom: -20px;
font-size: 20px;
animation: floatUp linear infinite;
opacity: 0.7;
}

@keyframes floatUp {
0% { transform: translateY(0); opacity: 0; }
50% { opacity: 1; }
100% { transform: translateY(-110vh); opacity: 0; }
}

header{
padding:30px;
font-size:28px;
font-weight:bold;
color:#ff4d6d;
}

h2{
margin-top:10px;
color:#fff;
font-weight:normal;
}

.gallery{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
border:2px solid #fff;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
}

.message{
padding:20px;
font-size:18px;
line-height:1.6;
}

audio{
margin:20px;
width:90%;
}
</style>
</head>

<body>

<header>
🎉 Happy Birthday <br> <span style="color:white;">Sushmitha (Mummy) ❤️</span>
</header>

<h2>You are the heart of our family 💖</h2>

<!-- Music -->
<audio controls autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
  Your browser does not support audio.
</audio>

<!-- Message -->
<div class="message">
Happy Birthday Mummy ❤️<br><br>
You are the most beautiful blessing in our life.  
May your smile always shine brighter than stars ✨  
We love you endlessly 💖  
</div>

<!-- Photo Gallery (11 photos) -->
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">
<img src="photo9.jpg">
<img src="photo10.jpg">
<img src="photo11.jpg">
</div>

<script>
// Floating hearts and flowers generator
function createFloating() {
  const el = document.createElement("div");
  el.classList.add(Math.random() > 0.5 ? "heart" : "flower");
  el.innerHTML = Math.random() > 0.5 ? "❤️" : "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (3 + Math.random() * 5) + "s";
  el.style.fontSize = (15 + Math.random() * 25) + "px";

  document.body.appendChild(el);

  setTimeout(() => {
    el.remove();
  }, 8000);
}

setInterval(createFloating, 300);
</script>

</body>
</html>
